server:
  port: 8080

playout:
  transition_seconds: 3
  filler_random_delay_minutes: 5
  # Stop sets / station IDs (patent: "commercial breaks assembled and inserted into the video programming")
  # Drop short .mp4 stings into ads_dir; one will play between every N requested videos.
  # Set ads_every_n_videos: 0 to disable.
  ads_dir: "assets/ads"
  ads_every_n_videos: 2
  ad_max_seconds: 90

fetcher:
  yt_dlp_path: "yt-dlp"
  max_resolution: 1080
  cache_dir: "data/cache"
  ready_dir: "data/ready"
  thumbnail_dir: "data/thumbnails"
  max_cache_gb: 50
  # Number of upcoming queue items the prefetch worker keeps warm. Goroutines
  # per video, so higher means more parallel downloads/transcodes in-flight.
  prefetch_threshold: 5
  # EBU R128 loudness target applied by ffmpeg's loudnorm filter during
  # transcode, so every cached video lands at the same perceived volume.
  # -14 matches YouTube/Spotify-ish, -16 is podcast/broadcast. 0 disables.
  loudness_target_lufs: -14.0

queue:
  max_requests_per_caller_per_hour: 3
  allow_duplicate_in_queue: false
  empty_queue_action: "random_play"

ivr:
  # Exposes POST /api/ivr/sessions (+ /digit, /submit, /confirm, /cancel,
  # DELETE) for any voice front-end to drive on-channel digit entry. Set
  # false to disable entirely.
  enabled: true
  # How long a session can sit in the `validated` state (after a valid
  # 3-digit code is accepted but before the caller presses 1 to confirm
  # or 2 to cancel) before the reaper drops it. The IVR prompt should
  # comfortably fit inside this window plus a couple of seconds of
  # thinking time.
  confirm_ttl_seconds: 15

database:
  path: "data/retromusicbox.db"

channel:
  width: 720
  height: 576
  phone_number_display: "0900 RETROMUSICBOX"
  # CRT effect (scanlines, vignette, contrast/saturate filter). Set to false
  # when feeding the channel into a real display or a downstream encoder
  # that already adds its own scaling/scanlines.
  crt_enabled: true
