name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Builds the shipping artifact end-to-end: Vite SPA -> //go:embed -> CGO
  # Go build for rmbd and rmbctl -> runtime image with ffmpeg + yt-dlp. If
  # this passes, the container the release workflow will push is known-good.
  # Doesn't push on PRs.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
